<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personal Profile Card</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- ===================== -->
    <!-- Theme Toggle -->
    <!-- ===================== -->

    <div class="theme-switch">

        <span>☀️</span>

        <label class="switch">

            <input type="checkbox" id="theme-toggle">

            <span class="slider"></span>

        </label>

        <span>🌙</span>

    </div>

    
    <!-- Profile Card -->
    <div class="card">

        <!-- Profile Image -->

        <img src="./assests/profile.jpg.jpg" alt="Profile Picture" class="profile-img">

        <!-- Name -->

        <h1>Saptarshi Kayari</h1>

        <!-- Role -->

        <h3>Computer Science Student</h3>

        <!-- About -->

        <p class="bio">
        Computer Science student curious and passionate about tech, AI, Data and Web.
        </p>


        <div class="skills">

            <span>HTML</span>

            <span>CSS</span>

            <span>Python</span>

            <span>SQL</span>

        </div>

        <div class="buttons">

    <a href="https://github.com/Saptarshi-23"
       target="_blank"
       class="btn">

        <i class="fa-brands fa-github"></i>
        GitHub

    </a>

    <a href="https://www.linkedin.com/in/saptarshi-kayari-50020837b/"
       class="btn secondary">

        <i class="fa-brands fa-linkedin"></i>
        LinkedIn

    </a>

</div>

    </div>

    <script src="script.js"></script>

</body>

</html>
